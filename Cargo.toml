[package]
name = "crab"
version = "0.1.0"
edition = "2024"
[lib]
path = "src/lib.rs"

[[bin]]
name = "crab"
path = "src/main.rs"

[dependencies]
async-trait = "0.1.89"
bincode-next = { version = "2.1.0", features = ["serde"] }
binrw = "0.15.1"
log = "0.4.32"
logforth = { version = "0.30.1", features = ["starter-log"] }
quinn = { version = "0.11.9", default-features = false, features = ["rustls-aws-lc-rs", "runtime-tokio"] }
rustls = { version = "0.23.40", default-features = false, features = ["aws-lc-rs"] }
rustls-native-certs = "0.8.3"
rustls-pemfile = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.52.2", features = ["rt-multi-thread", "macros", "signal"] }
tokio-util = { version = "0.7.18", features = ["codec"] }
toml = "1.1.2"
bytes = "1.11.1"
